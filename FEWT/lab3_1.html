<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        num1 = parseFloat(prompt("Enter no 1 : "));
        num2 = parseFloat(prompt("Enter no 2 : "));

        if(num1 > num2)
        {
            a = prompt("Enter Operators(+,-,*,/) : ");

            if(a = '+')
            {
                document.write("Addition = "+(num1 + num2));
            }

            else if (a = '-') 
            {
                document.write("Subtract = " + (num1 - num2));
            }

            else if (a = '*') 
            {
                document.write("Multiplication = " + (num1 * num2));
            }

            else if (a = '/') 
            {
                document.write("Divison = " + (num1 / num2));
            }
        }
    </script>
</body>
</html>
