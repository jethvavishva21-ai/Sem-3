<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box1
        {
            height: 100px;
            width: 100px;
            animation: color-changing 5s linear infinite;
        }

        @keyframes color-changing
        {
            from
            {
                background-color: red;
            }

            to
            {
                background-color: yellow;
            }
        }

        .box2
        {
            height: 100px;
            width: 100px;
            animation: moving 10s infinite;
            position: relative;
            margin-top: 100px;
            background-color: rebeccapurple;
        }

        @keyframes moving
        {
            0%
            {
                top:0px;
                left: 0px;
            }

            25%
            {
                top : 0px;
                left: 100px;
            }

            50%
            {
                top : 100px;
                left: 100px;
            }

            75%
            {
                top : 100px;
                left : 0px;
            }

            100%
            {
                top : 0px;
                left: 0px;
            }

        }
    </style>
</head>
<body>
    <div class="box1"></div>
    <hr>
    <div class="box2"></div>
</body>
</html>
